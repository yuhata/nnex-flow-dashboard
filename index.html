<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NNEX Internal Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js" crossorigin></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080C10; font-size: 18px; }

.db-root {
  font-family: 'Noto Sans JP', sans-serif;
  background: #080C10;
  min-height: 100vh;
  color: #C8D6E5;
  padding: 0;
}

/* Header */
.db-header {
  padding: 28px 32px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding-bottom: 20px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.db-eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.2em;
  color: #3D7FBF;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.db-title {
  font-family: 'Syne', sans-serif;
  font-size: 24px;
  font-weight: 800;
  color: #EAF0F8;
  letter-spacing: -0.01em;
}
.db-subtitle {
  font-size: 14px;
  color: #5A7A96;
  margin-top: 3px;
}
.db-timestamp {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: #3D5A70;
  text-align: right;
  line-height: 1.8;
}
.db-timestamp span { color: #2A8FD4; }

/* Tabs */
.db-tabs {
  display: flex;
  gap: 0;
  padding: 0 32px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  align-items: center;
}
.db-tab {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.12em;
  padding: 14px 20px 12px;
  cursor: pointer;
  color: #3D5A70;
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  text-transform: uppercase;
  position: relative;
  top: 1px;
}
.db-tab:hover { color: #7AAFD4; }
.db-tab.active { color: #EAF0F8; border-bottom-color: #2A8FD4; }
.db-tab .dot {
  display: inline-block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  margin-right: 7px;
  vertical-middle: middle;
}
.dot-realtime { background: #E05555; animation: pulse-dot 1.5s infinite; }
.dot-monthly { background: #2A8FD4; }
.dot-annual { background: #F0B429; }
.dot-fixed { background: #4CAF82; }
.dot-poi { background: #D81B60; }
.dot-sales { background: #9C27B0; }

/* Simulator */
.sim-container {
  background: #0E1520;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 24px;
}
.sim-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
}
.sim-label {
  font-size: 13px;
  color: #7AAFD4;
  width: 180px;
  flex-shrink: 0;
}
.sim-slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  outline: none;
}
.sim-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #2A8FD4;
  cursor: pointer;
  border: 2px solid #0E1520;
}
.sim-val {
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  color: #EAF0F8;
  width: 100px;
  text-align: right;
  flex-shrink: 0;
}
.sim-result-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.sim-result-card {
  padding: 16px;
  background: rgba(156,39,176,0.06);
  border: 1px solid rgba(156,39,176,0.15);
  border-radius: 8px;
  text-align: center;
}
.sim-result-label { font-size: 11px; color: #8A9AAA; margin-bottom: 8px; }
.sim-result-val {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 26px;
  color: #CE93D8;
}
.sim-result-sub { font-family: 'Space Mono', monospace; font-size: 10px; color: #5A7A96; margin-top: 4px; }

/* Pain point bar */
.pain-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.pain-label {
  font-size: 12px;
  color: #C8D6E5;
  width: 220px;
  flex-shrink: 0;
}
.pain-track {
  flex: 1;
  height: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 5px;
  overflow: hidden;
}
.pain-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.6s ease;
}
.pain-pct {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: #EAF0F8;
  width: 50px;
  text-align: right;
  flex-shrink: 0;
}

/* Facility compare card */
.facility-card {
  background: #0E1520;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.facility-name {
  font-size: 14px;
  font-weight: 500;
  color: #EAF0F8;
  margin-bottom: 10px;
}
.facility-stat {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 12px;
}
.facility-stat-label { color: #5A7A96; }
.facility-stat-val { font-family: 'Space Mono', monospace; color: #EAF0F8; }

/* POI Map tab */
.poi-map-container {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.06);
  background: #0E1520;
}
.poi-map-container iframe {
  width: 100%;
  height: calc(100vh - 180px);
  min-height: 500px;
  border: none;
  display: block;
}
.poi-map-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.settings-btn {
  margin-left: auto;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  padding: 6px 14px;
  cursor: pointer;
  color: #3D5A70;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.03);
  border-radius: 4px;
  transition: all 0.2s;
}
.settings-btn:hover { color: #7AAFD4; border-color: rgba(42,143,212,0.3); }

/* Content */
.db-content { padding: 24px 32px 40px; }

/* Section label */
.section-label {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: #3D5A70;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

/* Grid layouts */
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
.grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 20px; }

/* KPI Card */
.kpi-card {
  background: #0E1520;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.kpi-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent, #2A8FD4), transparent);
  opacity: 0.6;
}
.kpi-label { font-size: 12px; color: #4A6A84; margin-bottom: 10px; letter-spacing: 0.05em; }
.kpi-value {
  font-family: 'Syne', sans-serif;
  font-size: 30px;
  font-weight: 800;
  color: #EAF0F8;
  line-height: 1;
  margin-bottom: 6px;
  letter-spacing: -0.02em;
}
.kpi-value .unit { font-size: 15px; font-weight: 600; color: #5A8AAA; margin-left: 3px; }
.kpi-change { font-family: 'Space Mono', monospace; font-size: 12px; }
.kpi-change.up { color: #4CAF82; }
.kpi-change.down { color: #E05555; }
.kpi-change.neutral { color: #5A7A96; }
.kpi-source { font-size: 11px; color: #2A3D50; margin-top: 8px; font-family: 'Space Mono', monospace; }

/* Chart card */
.chart-card {
  background: #0E1520;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 20px;
}
.chart-title { font-size: 13px; color: #7AAFD4; margin-bottom: 16px; font-weight: 500; }

/* Bar rows */
.bar-row { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; }
.bar-row-label { font-size: 13px; color: #7AAFD4; width: 100px; flex-shrink: 0; text-align: right; }
.bar-row-track { flex: 1; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
.bar-row-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
.bar-row-val { font-family: 'Space Mono', monospace; font-size: 12px; color: #5A8AAA; width: 70px; flex-shrink: 0; }

/* Table */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: #3D5A70;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 0 10px 10px;
  text-align: left;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.data-table td {
  font-size: 14px;
  padding: 9px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: #C8D6E5;
}
.data-table td.mono { font-family: 'Space Mono', monospace; font-size: 13px; }
.data-table td.rank { font-family: 'Space Mono', monospace; font-size: 12px; color: #3D5A70; }
.data-table td.up { color: #4CAF82; font-family: 'Space Mono', monospace; font-size: 12px; }
.data-table td.down { color: #E05555; font-family: 'Space Mono', monospace; font-size: 12px; }
.data-table tr:hover td { background: rgba(42,143,212,0.04); }

/* Update badge */
.update-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: 0.1em;
}
.badge-realtime { background: rgba(224,85,85,0.12); color: #E05555; border: 1px solid rgba(224,85,85,0.2); }
.badge-monthly { background: rgba(42,143,212,0.12); color: #2A8FD4; border: 1px solid rgba(42,143,212,0.2); }
.badge-annual { background: rgba(240,180,41,0.1); color: #F0B429; border: 1px solid rgba(240,180,41,0.2); }
.badge-fixed { background: rgba(76,175,130,0.1); color: #4CAF82; border: 1px solid rgba(76,175,130,0.2); }

.source-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.divider { height: 1px; background: rgba(255,255,255,0.04); margin: 20px 0; }
.highlight-num { font-family: 'Space Mono', monospace; color: #F0B429; }

.target-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: rgba(240,180,41,0.06);
  border: 1px solid rgba(240,180,41,0.15);
  border-radius: 6px;
  margin-bottom: 12px;
}
.target-label { font-size: 13px; color: #8A9AAA; }
.target-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 20px; color: #F0B429; margin-left: auto; }

.two-col-stat { display: flex; gap: 0; }
.col-stat { flex: 1; padding: 14px 16px; border-right: 1px solid rgba(255,255,255,0.05); }
.col-stat:last-child { border-right: none; }
.col-stat-label { font-size: 12px; color: #4A6A84; margin-bottom: 6px; }
.col-stat-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 22px; color: #EAF0F8; }
.col-stat-sub { font-family: 'Space Mono', monospace; font-size: 11px; color: #4CAF82; margin-top: 3px; }

/* Settings modal */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.modal-card {
  background: #0E1520;
  border: 1px solid rgba(42,143,212,0.2);
  border-radius: 12px;
  padding: 28px 32px;
  width: 480px;
  max-width: 90vw;
}
.modal-title {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: #EAF0F8;
  margin-bottom: 20px;
}
.modal-label {
  font-size: 12px;
  color: #5A8AAA;
  margin-bottom: 6px;
  font-family: 'Space Mono', monospace;
  letter-spacing: 0.1em;
}
.modal-input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  padding: 10px 14px;
  color: #EAF0F8;
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  margin-bottom: 16px;
  outline: none;
  transition: border-color 0.2s;
}
.modal-input:focus { border-color: rgba(42,143,212,0.5); }
.modal-input::placeholder { color: #2A3D50; }
.modal-hint { font-size: 11px; color: #2A3D50; margin-top: -12px; margin-bottom: 16px; font-family: 'Space Mono', monospace; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
.modal-btn {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  padding: 8px 20px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
}
.modal-btn-primary { background: #2A8FD4; color: #fff; }
.modal-btn-primary:hover { background: #3DA0E0; }
.modal-btn-secondary { background: rgba(255,255,255,0.06); color: #7AAFD4; }
.modal-btn-secondary:hover { background: rgba(255,255,255,0.1); }

/* Status indicator */
.api-status {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 3px;
  margin-bottom: 16px;
}
.api-ok { color: #4CAF82; background: rgba(76,175,130,0.1); }
.api-err { color: #E05555; background: rgba(224,85,85,0.1); }
.api-none { color: #3D5A70; background: rgba(255,255,255,0.03); }

/* Congestion level */
.congestion-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.congestion-card {
  background: #0E1520;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 16px;
  position: relative;
  overflow: hidden;
}
.congestion-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--level-color, #2A8FD4);
  opacity: 0.8;
}
.congestion-station {
  font-size: 15px;
  font-weight: 500;
  color: #EAF0F8;
  margin-bottom: 4px;
}
.congestion-line {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: #3D5A70;
  margin-bottom: 10px;
}
.congestion-level {
  display: flex;
  align-items: center;
  gap: 8px;
}
.congestion-bar-track {
  flex: 1;
  height: 8px;
  background: rgba(255,255,255,0.05);
  border-radius: 4px;
  overflow: hidden;
}
.congestion-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1s ease;
}
.congestion-pct {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 20px;
  color: var(--level-color, #2A8FD4);
  min-width: 50px;
  text-align: right;
}
.congestion-time {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: #2A3D50;
  margin-top: 6px;
}

/* Loading spinner */
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(42,143,212,0.2);
  border-top-color: #2A8FD4;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #3D5A70;
  font-size: 14px;
}
.empty-state .icon { font-size: 34px; margin-bottom: 12px; opacity: 0.4; }

/* Responsive */
@media (max-width: 900px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: 1fr; }
  .grid-2 { grid-template-columns: 1fr; }
  .grid-2-1 { grid-template-columns: 1fr; }
  .db-header { flex-direction: column; align-items: flex-start; gap: 12px; }
  .db-timestamp { text-align: left; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/javascript">
const { useState, useEffect, useCallback, useRef } = React;
const {
  BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer,
  LineChart, Line, CartesianGrid, Cell, AreaChart, Area
} = Recharts;

// ─────────────────────────────────────────────
// データ定義（手動更新セクション）
// ─────────────────────────────────────────────

// JNTO 訪日外客数 月次推計値（手動更新）
// 出典: https://www.jnto.go.jp/statistics/visitor-statistics/
// 最終更新: 2026-04-01
const JNTO_MONTHLY_2025 = [

// 国籍別 2025年累計推計値（JNTO）
const NATIONALITY_2025 = [

  { flag: "\u{1F1E8}\u{1F1F3}", name: "中国", val: 910 },

// 都道府県別 外国人延べ宿泊者数（観光庁 2024年確定値）
const PREF_STAY_2024 = [
  { pref: "東京都", nights: 5720, yoy: "+38.9%" },
  { pref: "大阪府", nights: 2534, yoy: "+42.1%" },
  { pref: "京都府", nights: 1661, yoy: "+35.2%" },
  { pref: "北海道", nights: 965,  yoy: "+28.4%" },
  { pref: "沖縄県", nights: 733,  yoy: "+21.7%" },
  { pref: "福岡県", nights: 692,  yoy: "+37.3%" },

// JR東日本 主要駅 1日平均乗車人員（2024年度）
const STATION_DATA = [
  { station: "新宿", ridership: 667, change: "+2.5%", note: "JR乗車のみ" },
  { station: "池袋", ridership: 499, change: "+1.9%", note: "JR乗車のみ" },

  { station: "品川", ridership: 310, change: "+4.2%", note: "JR乗車のみ（概算）" },
];

// 駅別全社合計乗降客数（国土交通省 令和5年度）
const STATION_ALL = [
  { station: "新宿（全社）", val: 152 },

function getCongestionColor(pct) {
  if (pct <= 50) return CONGESTION_COLORS.low;
  if (pct <= 100) return CONGESTION_COLORS.medium;
  if (pct <= 150) return CONGESTION_COLORS.high;
  return CONGESTION_COLORS.extreme;
}

function getCongestionLabel(pct) {
  if (pct <= 50) return "空いている";
  if (pct <= 100) return "通常";
  if (pct <= 150) return "混雑";
  return "非常に混雑";
}

// 宿泊旅行統計調査 statsDataId
const ESTAT_SHUKUHAKU_ID = "0003427354"; // 都道府県別外国人延べ宿泊者数

async function fetchEstatData(appId) {
  const url = `https://api.e-stat.go.jp/rest/3.0/app/json/getStatsData?appId=${appId}&statsDataId=${ESTAT_SHUKUHAKU_ID}&limit=100`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`e-Stat API error: ${res.status}`);
  const data = await res.json();
  return data;
}

// ─────────────────────────────────────────────
// ODPT API — フェッチ
// ─────────────────────────────────────────────

async function fetchODPTCongestion(apiKey) {
  // ODPT APIはCORS制限があるため、直接フェッチを試みる
  const url = `https://api.odpt.org/api/v4/odpt:TrainInformation?acl:consumerKey=${apiKey}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`ODPT API error: ${res.status}`);
  return await res.json();
}

async function fetchODPTTrainType(apiKey) {
  // 列車ロケーション情報（混雑度を含む場合あり）
  const url = `https://api.odpt.org/api/v4/odpt:Train?acl:consumerKey=${apiKey}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`ODPT API error: ${res.status}`);
  return await res.json();
}
