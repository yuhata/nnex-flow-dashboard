<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

.root {
  font-family: 'Noto Sans JP', sans-serif;
  background: #080C10;
  min-height: 100vh;
  color: #C8D6E5;
}

.header {
  padding: 24px 28px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: #2A6090;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.title {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: #EAF0F8;
}
.subtitle { font-size: 11px; color: #3D5A70; margin-top: 2px; }

.view-btn {

  font-size: 10px;
  padding: 6px 14px;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: #5A7A96;
  cursor: pointer;
  letter-spacing: 0.1em;
  transition: all 0.15s;
}
.view-btn:hover { color: #EAF0F8; border-color: rgba(255,255,255,0.2); }
.view-btn.active {
  background: rgba(42,143,212,0.15);
  color: #2A8FD4;
  border-color: rgba(42,143,212,0.35);
}

.map-layout {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 0;
  height: calc(100vh - 88px);
  min-height: 520px;
}

.matrix-wrap {
  position: relative;
  margin: 28px 24px 36px 36px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  background: #0A0F16;
  overflow: hidden;
}

.grid-h {
  position: absolute;
  top: 50%; left: 0; right: 0;
  height: 1px;
  background: rgba(255,255,255,0.07);
  pointer-events: none;
}
.grid-v {
  position: absolute;
  left: 50%; top: 0; bottom: 0;
  width: 1px;
  background: rgba(255,255,255,0.07);
  pointer-events: none;
}

.nnex-territory {
  position: absolute;
  right: 0; top: 0;
  width: 50%; height: 50%;
  background: rgba(42,143,212,0.04);
  border-left: 1px dashed rgba(42,143,212,0.2);
  border-bottom: 1px dashed rgba(42,143,212,0.2);
  pointer-events: none;
}

.axis-y-top, .axis-y-bot, .axis-x-left, .axis-x-right {
  position: absolute;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: #2A4A60;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  pointer-events: none;
}
.axis-y-top { top: 8px; left: 50%; transform: translateX(-50%); }
.axis-y-bot { bottom: 8px; left: 50%; transform: translateX(-50%); }
.axis-x-left { left: 8px; top: 50%; transform: translateY(-50%) rotate(-90deg); }
.axis-x-right { right: 8px; top: 50%; transform: translateY(-50%) rotate(90deg); }

.quad {
  position: absolute;
  font-size: 9px;
  color: #1A3040;
  letter-spacing: 0.08em;
  display: flex;
  flex-direction: column;
  gap: 3px;
  pointer-events: none;
}
.q1 { left: 16px; top: 12px; }
.q2 { right: 16px; top: 12px; text-align: right; color: #1A3A50; }
.q3 { left: 16px; bottom: 12px; }
.q4 { right: 16px; bottom: 12px; text-align: right; }
.quad-note { color: #1A4A6A; font-size: 8px; }

.dots-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.dot-wrap {
  position: absolute;
  transform: translate(-50%, 50%);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.dot {
  border-radius: 50%;
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
  z-index: 2;
}
.dot-wrap:hover .dot, .dot-wrap.sel .dot {
  transform: scale(1.25);
}

.nnex-ring {
  position: absolute;
  width: 42px; height: 42px;
  border: 1.5px solid rgba(42,143,212,0.4);
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation: pulse 2.5s ease-in-out infinite;
  pointer-events: none;
}
.partner-ring {
  position: absolute;
  width: 32px; height: 32px;
  border: 1px dashed rgba(240,180,41,0.4);
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
@keyframes pulse {
  0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
  50%       { opacity: 0.7; transform: translate(-50%, -50%) scale(1.15); }
}

.dot-label {
  font-size: 9px;
  font-family: 'Space Mono', monospace;
  margin-top: -20px;
  white-space: nowrap;
  background: rgba(8,12,16,0.85);
  padding: 1px 4px;

.nnex-label { font-weight: 700; font-size: 10px; }

.detail-panel {

.detail-section { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); }

.detail-section-label {

.detail-row {

.detail-row.weak { color: #5A7A96; }

.detail-source {

.detail-hint {

.comp-table td {

  color: #C8D6E5;

.comp-table tr:hover td { background: rgba(42,143,212,0.03); }
.us-row td { background: rgba(42,143,212,0.06); }
.us-row:hover td { background: rgba(42,143,212,0.1) !important; }

.chip {

  font-size: 10px;

        h("div", { className: "eyebrow" }, "NNEX / \u7AF6\u5408\u5206\u6790"),
        h("div", { className: "title" }, "\u7AF6\u5408\u30DD\u30B8\u30B7\u30E7\u30CB\u30F3\u30B0\u30DE\u30C3\u30D7"),
        h("div", { className: "subtitle" }, "\u30A4\u30F3\u30D0\u30A6\u30F3\u30C9\u4F53\u9A13\u30FB\u30C7\u30FC\u30BF\u5E02\u5834 \u2014 2026\u5E74\u6642\u70B9")
      ),
      h("div", { style: { display: "flex", gap: 8, alignItems: "center" } },
        h("button", { className: "view-btn " + (view === "map" ? "active" : ""), onClick: function() { setView("map"); } }, "\u30DE\u30C3\u30D7"),
        h("button", { className: "view-btn " + (view === "table" ? "active" : ""), onClick: function() { setView("table"); } }, "\u6BD4\u8F03\u8868")
      )
    ),

    view === "map" ?
      // Map view
      h("div", { className: "map-layout" },
        // Matrix
        h("div", { className: "matrix-wrap" },
          h("div", { className: "axis-y-top" }, "\u4F53\u9A13\u30FB\u30A8\u30F3\u30B2\u30FC\u30B8\u578B"),
          h("div", { className: "axis-y-bot" }, "\u60C5\u5831\u63D0\u4F9B\u578B"),
          h("div", { className: "axis-x-left" }, "\u30A8\u30EA\u30A2\u30FB\u5C4B\u5916"),
          h("div", { className: "axis-x-right" }, "\u65BD\u8A2D\u5185\u30FB\u30DF\u30AF\u30ED"),
          h("div", { className: "quad q1" }, h("span", null, "\u5C4B\u5916\u30CA\u30D3\uFF0B\u4F53\u9A13")),
          h("div", { className: "quad q2" }, h("span", null, "\u65BD\u8A2D\u5185\u4F53\u9A13"), h("span", { className: "quad-note" }, "\u2190 NNEX\u306E\u9818\u57DF")),
          h("div", { className: "quad q3" }, h("span", null, "\u30A8\u30EA\u30A2\u4EBA\u6D41\u30C7\u30FC\u30BF")),
          h("div", { className: "quad q4" }, h("span", null, "\u65BD\u8A2D\u5185\u591A\u8A00\u8A9E\u30FB\u63A5\u5BA2")),
          h("div", { className: "grid-h" }),
          h("div", { className: "grid-v" }),
          h("div", { className: "nnex-territory" }),

          // SVG connecting lines
          h("svg", { className: "dots-svg", viewBox: "0 0 100 100", preserveAspectRatio: "none" },
            players.filter(function(p) { return p.id !== "nnex"; }).map(function(p) {
              return h("line", { key: p.id + "-line", x1: nnex.x, y1: 100 - nnex.y, x2: p.x, y2: 100 - p.y, stroke: "rgba(42,143,212,0.06)", strokeWidth: "0.3" });
            })
          ),

          // Dots
          players.map(function(p) {
            var isHov = hovered === p.id;
            var isSel = sel && sel.id === p.id;
            return h("div", {
              key: p.id,
              className: "dot-wrap " + (isSel ? "sel" : ""),
              style: { left: p.x + "%", bottom: p.y + "%", zIndex: isSel ? 20 : isHov ? 15 : 10 },
              onMouseEnter: function() { setHovered(p.id); },
              onMouseLeave: function() { setHovered(null); },
              onClick: function() { setSelected(p); }
            },
              p.ring && h("div", { className: "nnex-ring" }),
              p.partner && h("div", { className: "partner-ring" }),
              h("div", { className: "dot", style: {
                width: p.size, height: p.size,
                background: p.id === "nnex" ? "radial-gradient(circle, #4AAFD4, #1A6090)" : p.color,
                boxShadow: isSel ? "0 0 0 2px " + p.color + ", 0 0 16px " + p.color + "66" : "0 0 8px " + p.color + "44",
                opacity: p.id === "nnex" ? 1 : 0.75
              }}),
              h("div", { className: "dot-label " + (p.id === "nnex" ? "nnex-label" : ""), style: { color: p.id === "nnex" ? "#2A8FD4" : p.color } },
                p.name.split("\n")[0],
                p.partner && h("span", { className: "partner-badge" }, "BD")
              )
            );
          })
        ),

        // Detail panel
        h("div", { className: "detail-panel" },
          h("div", { className: "legend", style: { marginBottom: 16 } },
            Object.entries(categories).map(function(entry) {
              return h("div", { key: entry[0], className: "legend-item" },
                h("div", { className: "legend-dot", style: { background: entry[1].color } }),
                h("span", null, entry[1].label)
              );
            })
          ),
          sel ? h("div", { className: "detail-card", style: { "--accent": sel.color } },
            h("div", { className: "detail-header" },
              h("div", { className: "detail-dot", style: { background: sel.color } }),
              h("div", null,
                h("div", { className: "detail-name" }, sel.name.replace("\n", " ")),
                h("div", { className: "detail-tag" }, sel.tag)
              ),
              sel.partner && h("div", { className: "partner-tag" }, "BD\u691C\u8A0E\u4E2D"),
              sel.id === "nnex" && h("div", { className: "us-tag" }, "\u2190 \u81EA\u793E")
            ),
            h("p", { className: "detail-summary" }, sel.summary),
            h("div", { className: "detail-section" },
              h("div", { className: "detail-section-label" }, "\u5F37\u307F"),
              sel.strengths.map(function(s, i) {
                return h("div", { key: i, className: "detail-row strength" }, h("span", { className: "icon" }, "\u25B2"), s);
              })
            ),
            h("div", { className: "detail-section" },
              h("div", { className: "detail-section-label" }, "\u5F31\u307F\u30FB\u5236\u7D04"),
              sel.weaknesses.map(function(w, i) {
                return h("div", { key: i, className: "detail-row weak" }, h("span", { className: "icon" }, "\u25BC"), w);
              })
            ),
            sel.id !== "nnex" && h("div", { className: "vs-box" },
              h("div", { className: "vs-label" }, "NNEX\u3068\u306E\u5DEE\u5225\u5316"),
              h("div", { className: "vs-text" }, vsTexts[sel.category] || "")
            ),
            h("div", { className: "detail-source" }, "\u51FA\u5178: " + sel.source)
          ) : h("div", { className: "detail-hint" }, "\u2190 \u30DE\u30C3\u30D7\u306E\u30D7\u30EC\u30A4\u30E4\u30FC\u3092\u30AF\u30EA\u30C3\u30AF\u3059\u308B\u3068\u8A73\u7D30\u304C\u8868\u793A\u3055\u308C\u307E\u3059")
        )
      ) :

      // Table view
      h("div", { style: { padding: "20px 28px 40px" } },
        h("div", { className: "table-wrap" },
          h("table", { className: "comp-table" },
            h("thead", null,
              h("tr", null,
                h("th", null, "\u30D7\u30EC\u30A4\u30E4\u30FC"),
                h("th", null, "AR\u3042\u308A"),
                h("th", null, "\u65BD\u8A2D\u5185\u30C7\u30FC\u30BF"),
                h("th", null, "\u591A\u8A00\u8A9EAI"),
                h("th", null, "\u884C\u52D5\u30C7\u30FC\u30BF\u8CA9\u58F2"),
                h("th", null, "\u5E38\u8A2DXaaS"),
                h("th", null, "\u4E3B\u306A\u30BF\u30FC\u30B2\u30C3\u30C8")
              )
            ),
            h("tbody", null,
              tableRows.map(function(r, i) {
                return h("tr", { key: i, className: r.us ? "us-row" : "" },
                  h("td", null,
                    h("div", { style: { fontWeight: r.us ? 600 : 400, color: r.us ? "#2A8FD4" : "#C8D6E5" } }, r.name),
                    h("div", { style: { fontSize: 9, color: "#3D5A70", fontFamily: "'Space Mono',monospace" } }, r.tag)
                  ),
                  h("td", { style: { textAlign: "center" } }, chipEl(r.ar)),
                  h("td", { style: { textAlign: "center" } }, chipEl(r.indoor)),
                  h("td", { style: { textAlign: "center" } }, chipEl(r.ml)),
                  h("td", { style: { textAlign: "center" } }, chipEl(r.data)),
                  h("td", { style: { textAlign: "center" } }, chipEl(r.xaas)),
                  h("td", { style: { fontSize: 11, color: "#7AAFD4" } }, r.target)
                );
              })
            )
          )
        ),
        h("div", { className: "insight-box" },
          h("div", { className: "insight-title" }, "\uD83C\uDFAF NNEX\u304C\u552F\u4E00\u30AB\u30D0\u30FC\u3059\u308B\u9818\u57DF"),
          h("div", { className: "insight-body" },
            "\u300CAR\u5E38\u8A2D \u00D7 \u65BD\u8A2D\u5185\u884C\u52D5\u30C7\u30FC\u30BF \u00D7 AI\u591A\u8A00\u8A9E \u00D7 XaaS\u8CA9\u58F2\u300D\u306E4\u8981\u7D20\u3092\u540C\u6642\u306B\u6E80\u305F\u3059\u30D7\u30EC\u30A4\u30E4\u30FC\u306F\u73FE\u6642\u70B9\u3067\u5B58\u5728\u3057\u306A\u3044\u3002\u65BD\u8A2D\u5185\u306E\u300C\u610F\u56F3\u3042\u308B\u884C\u52D5\u30C7\u30FC\u30BF\uFF08\u3069\u3053\u3067\u8FF7\u3044\u3001\u4F55\u306B\u7ACB\u3061\u6B62\u307E\u3063\u305F\u304B\uFF09\u300D\u306F\u3001GPS\u30FBWi-Fi\u30FBPOS\u3067\u306F\u53D6\u5F97\u3067\u304D\u306A\u3044\u552F\u4E00\u7121\u4E8C\u306E\u8CC7\u7523\u3068\u306A\u308B\u3002"
          )
        )
      )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(PositioningMap));
</script>
